<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta de Sorteo</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <div id="sr-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <div class="layout">

    <!-- ── Editor lateral ── -->
    <aside class="editor-panel" id="editor-panel">
      <h2 class="editor-title">Participantes</h2>

      <ul id="participant-list" class="participant-list"></ul>

      <div class="add-row">
        <input
          type="text"
          id="new-name-input"
          class="add-input"
          placeholder="Nombre..."
          maxlength="30"
          autocomplete="off"
        />
        <button id="add-btn" class="add-btn" aria-label="Añadir participante">+</button>
      </div>

      <button id="reset-btn" class="reset-btn">Restaurar por defecto</button>
    </aside>

    <!-- ── Ruleta ── -->
    <main class="app">
      <h1 id="app-title">Sorteo</h1>

      <div class="wheel-wrapper" id="wheel-wrapper">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheel-canvas"></canvas>
      </div>

      <button id="spin-btn" aria-label="Girar la ruleta">GIRAR</button>
    </main>

  </div>

  <!-- Winner modal -->
  <div id="winner-modal" role="dialog" aria-modal="true" aria-labelledby="winner-name" aria-hidden="true">
    <div class="modal-content">
      <div class="winner-label">✦ &nbsp;GANADOR&nbsp; ✦</div>
      <div class="winner-stars">🎉 🏆 🎉</div>
      <div id="winner-name"></div>
      <button id="modal-close">Nueva Ruleta</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/winner.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
